<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PawfectHome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="Dogs.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background-color: #F1BC19;
        }

        .nav-link {
            color: #fff;
            font-weight: bold;
        }

        .nav-link:hover {
            color: #000;
        }

        .breed {
            height: 300px;
            /* Placeholder height */
            background-size: cover;
            background-position: center;
        }

        .doodle {
            background-image: url('images/golden_doodle.jpg');
        }

        .lab {
            background-image: url('images/labrador_retriever.jpg');
        }

        .pomeranian {
            background-image: url('images/pomeranian.jpg');
        }

        .husky {
            background-image: url('images/siberian_husky.jpg');
        }

        .poodle {
            background-image: url('images/poodle.jpg');
        }

        .shepherd {
            background-image: url('images/german_shepherd.jpg');
        }

        .name {
            margin-top: 20px;
        }

        .icon {
            width: 30px;
            height: 30px;
        }

        .ham-btn,
        .close-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .ham-btn {
                display: inline-block;
            }

            .nav-pills {
                display: none;
            }

            .nav-pills.show {
                display: block;
            }

            .close-btn {
                display: none;
            }

            .close-btn.show {
                display: inline-block;
            }
        }
    </style>
</head>

<body>
    <div id="Dogs" class="container-fluid">
        <button class="ham-btn icon btn btn-light"><img src="Ham.png" alt="menu"></button>
        <button class="close-btn icon btn btn-light"><img src="close.png" alt="close"></button>
        <div class="row mt-5">
            <div class="col-md-4">
                <nav id="navbar-example3" class="h-100 flex-column align-items-stretch pe-4 border-end">
                    <nav class="nav nav-pills flex-column navbar-custom">
                        <a class="nav-link" href="#item-1">Golden Doodle</a>
                        <a class="nav-link" href="#item-2">Labrador Retriever</a>
                        <a class="nav-link" href="#item-3">Pomeranian</a>
                        <a class="nav-link" href="#item-4">Siberian Husky</a>
                        <a class="nav-link" href="#item-5">Poodle</a>
                        <a class="nav-link" href="#item-6">German Shepherd</a>
                    </nav>
                </nav>
            </div>
            <div class="col-md-8">
                <div data-bs-spy="scroll" data-bs-target="#navbar-example3" data-bs-smooth-scroll="true"
                    class="scrollspy-example-2" tabindex="0">
                    <h3 class="name" id="item-1">Golden Doodle</h3>
                    <div class="breed doodle"></div>
                    <h3 class="name" id="item-2">Labrador Retriever</h3>
                    <div class="breed lab"></div>
                    <h3 class="name" id="item-3">Pomeranian</h3>
                    <div class="breed pomeranian"></div>
                    <h3 class="name" id="item-4">Siberian Husky</h3>
                    <div class="breed husky"></div>
                    <h3 class="name" id="item-5">Poodle</h3>
                    <div class="breed poodle"></div>
                    <h3 class="name" id="item-6">German Shepherd</h3>
                    <div class="breed shepherd"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script/dogscontent.js"></script>
    <script src="script/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        document.querySelector('.ham-btn').addEventListener('click', function () {
            document.querySelector('.nav-pills').classList.add('show');
            document.querySelector('.close-btn').classList.add('show');
            this.style.display = 'none';
        });
        document.querySelector('.close-btn').addEventListener('click', function () {
            document.querySelector('.nav-pills').classList.remove('show');
            document.querySelector('.ham-btn').style.display = 'inline-block';
            this.classList.remove('show');
        });
    </script>
</body>

</html>
